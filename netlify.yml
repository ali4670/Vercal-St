build:
  command: npm run build
  publish: dist
  base: /

redirects:
  - from: /*
    to: /index.html
    status: 200

environment:
  NODE_VERSION: 20

context:
  production:
    environment:
      NODE_ENV: production
  deploy-preview:
    environment:
      NODE_ENV: development
  branch-deploy:
    environment:
      NODE_ENV: development

headers:
  - for: /*
    values:
      Cache-Control: public, max-age=31536000, immutable
  - for: /api/*
    values:
      Access-Control-Allow-Origin: *
      Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS
      Access-Control-Allow-Headers: Authorization, Content-Type

dev:
  command: npm run dev
  port: 5173
  targetPort: 5173
  autoLaunch: true
